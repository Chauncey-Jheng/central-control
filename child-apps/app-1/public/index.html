<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <style>
    :root {
      --bg: #faf8ef;
      --panel: #bbada0;
      --cell: rgba(238, 228, 218, 0.35);
      --text: #776e65;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }
    .wrap { width: 100%; max-width: 420px; }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 { margin: 0; font-size: 40px; }
    .scores { display: flex; gap: 8px; }
    .score-box {
      background: var(--panel);
      color: #fff;
      border-radius: 6px;
      padding: 8px 14px;
      text-align: center;
      min-width: 64px;
    }
    .score-box .label { font-size: 11px; opacity: 0.8; text-transform: uppercase; }
    .score-box .value { font-size: 20px; font-weight: bold; }
    .bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .hint { font-size: 13px; }
    button.restart {
      background: #8f7a66;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    .board {
      position: relative;
      background: var(--panel);
      border-radius: 8px;
      padding: 8px;
      touch-action: none;
      user-select: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background: var(--cell);
      border-radius: 4px;
    }
    .tiles { position: absolute; inset: 8px; }
    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-weight: bold;
      transition: top 0.1s ease, left 0.1s ease;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(238, 228, 218, 0.73);
      border-radius: 8px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 28px;
      font-weight: bold;
    }
    .overlay.show { display: flex; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-row">
      <h1>2048</h1>
      <div class="scores">
        <div class="score-box">
          <div class="label">分数</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="label">最高分</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </div>
    <div class="bar">
      <div class="hint">方向键 / 滑动合并方块，凑出 2048</div>
      <button class="restart" id="restart">重新开始</button>
    </div>
    <div class="board" id="board">
      <div class="grid" id="grid"></div>
      <div class="tiles" id="tiles"></div>
      <div class="overlay" id="overlay">
        <div id="overlay-text">游戏结束</div>
        <button class="restart" id="overlay-restart">再来一局</button>
      </div>
    </div>
  </div>

  <script>
    const SIZE = 4;
    const STORAGE_BEST = 'game-2048-best-score';
    const TILE_COLORS = {
      2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
      32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
      512: '#edc850', 1024: '#edc53f', 2048: '#edc22e',
    };
    const TILE_TEXT_COLOR = (value) => (value <= 4 ? '#776e65' : '#f9f6f2');

    const gridEl = document.getElementById('grid');
    const tilesEl = document.getElementById('tiles');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlayEl = document.getElementById('overlay');
    const overlayTextEl = document.getElementById('overlay-text');

    let board = [];
    let score = 0;
    let best = Number(localStorage.getItem(STORAGE_BEST)) || 0;
    let wonAcknowledged = false;

    for (let i = 0; i < SIZE * SIZE; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      gridEl.appendChild(cell);
    }

    function emptyBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    function emptyCells(b) {
      const cells = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (b[r][c] === 0) cells.push([r, c]);
        }
      }
      return cells;
    }

    function spawnTile(b) {
      const cells = emptyCells(b);
      if (cells.length === 0) return false;
      const [r, c] = cells[Math.floor(Math.random() * cells.length)];
      b[r][c] = Math.random() < 0.9 ? 2 : 4;
      return true;
    }

    function slideRowLeft(row) {
      const values = row.filter((v) => v !== 0);
      let gained = 0;
      for (let i = 0; i < values.length - 1; i++) {
        if (values[i] === values[i + 1]) {
          values[i] *= 2;
          gained += values[i];
          values.splice(i + 1, 1);
        }
      }
      while (values.length < SIZE) values.push(0);
      return { row: values, gained };
    }

    function transpose(b) {
      return b[0].map((_, c) => b.map((row) => row[c]));
    }

    function moveLeft(b) {
      let gained = 0;
      const next = b.map((row) => {
        const result = slideRowLeft(row);
        gained += result.gained;
        return result.row;
      });
      return { board: next, gained };
    }

    function moveRight(b) {
      const reversed = b.map((row) => [...row].reverse());
      const result = moveLeft(reversed);
      return { board: result.board.map((row) => [...row].reverse()), gained: result.gained };
    }

    function moveUp(b) {
      const result = moveLeft(transpose(b));
      return { board: transpose(result.board), gained: result.gained };
    }

    function moveDown(b) {
      const result = moveRight(transpose(b));
      return { board: transpose(result.board), gained: result.gained };
    }

    function boardsEqual(a, b) {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (a[r][c] !== b[r][c]) return false;
        }
      }
      return true;
    }

    function canMove(b) {
      if (emptyCells(b).length > 0) return true;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const v = b[r][c];
          if (c < SIZE - 1 && v === b[r][c + 1]) return true;
          if (r < SIZE - 1 && v === b[r + 1][c]) return true;
        }
      }
      return false;
    }

    function hasWon(b) {
      return b.some((row) => row.some((v) => v >= 2048));
    }

    function render() {
      tilesEl.innerHTML = '';
      const cellGap = 8;
      const boardEl = document.getElementById('board');
      const size = boardEl.clientWidth - cellGap * 2;
      const tileSize = (size - cellGap * (SIZE - 1)) / SIZE;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const value = board[r][c];
          if (!value) continue;
          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.textContent = value;
          tile.style.width = `${tileSize}px`;
          tile.style.height = `${tileSize}px`;
          tile.style.left = `${c * (tileSize + cellGap)}px`;
          tile.style.top = `${r * (tileSize + cellGap)}px`;
          tile.style.background = TILE_COLORS[value] || '#3c3a32';
          tile.style.color = TILE_TEXT_COLOR(value);
          tile.style.fontSize = value >= 1024 ? '20px' : '26px';
          tilesEl.appendChild(tile);
        }
      }

      scoreEl.textContent = score;
      bestEl.textContent = best;
    }

    function applyMove(mover) {
      if (overlayEl.classList.contains('show')) return;
      const result = mover(board);
      if (boardsEqual(board, result.board)) return;

      board = result.board;
      score += result.gained;
      if (score > best) {
        best = score;
        localStorage.setItem(STORAGE_BEST, String(best));
      }
      spawnTile(board);
      render();

      if (!wonAcknowledged && hasWon(board)) {
        wonAcknowledged = true;
        showOverlay('你赢了！');
        return;
      }
      if (!canMove(board)) {
        showOverlay('游戏结束');
      }
    }

    function showOverlay(text) {
      overlayTextEl.textContent = text;
      overlayEl.classList.add('show');
    }

    function hideOverlay() {
      overlayEl.classList.remove('show');
    }

    function restart() {
      board = emptyBoard();
      score = 0;
      wonAcknowledged = false;
      hideOverlay();
      spawnTile(board);
      spawnTile(board);
      render();
    }

    document.addEventListener('keydown', (event) => {
      switch (event.key) {
        case 'ArrowLeft': event.preventDefault(); applyMove(moveLeft); break;
        case 'ArrowRight': event.preventDefault(); applyMove(moveRight); break;
        case 'ArrowUp': event.preventDefault(); applyMove(moveUp); break;
        case 'ArrowDown': event.preventDefault(); applyMove(moveDown); break;
      }
    });

    let touchStart = null;
    const boardEl = document.getElementById('board');
    boardEl.addEventListener('touchstart', (event) => {
      const t = event.changedTouches[0];
      touchStart = { x: t.clientX, y: t.clientY };
    });
    boardEl.addEventListener('touchend', (event) => {
      if (!touchStart) return;
      const t = event.changedTouches[0];
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      touchStart = null;
      const threshold = 24;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < threshold) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        applyMove(dx > 0 ? moveRight : moveLeft);
      } else {
        applyMove(dy > 0 ? moveDown : moveUp);
      }
    });

    document.getElementById('restart').addEventListener('click', restart);
    document.getElementById('overlay-restart').addEventListener('click', restart);
    window.addEventListener('resize', render);

    restart();
  </script>
</body>
</html>
